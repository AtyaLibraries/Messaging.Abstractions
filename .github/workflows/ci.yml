name: CI

on:
  push:
    branches: [development, master]
  pull_request:
    branches: [development, master]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  ci:
    uses: AtyaLibraries/github-workflows/.github/workflows/dotnet-package-ci.yml@950f73c1f1fc997bc2d5c83d68c1729f748a0f77
    with:
      solution: ./Messaging.Abstractions.sln
      test-project: ./tests/Abstractions.UnitTests/Abstractions.UnitTests.csproj
      package-project: ./src/Abstractions/Abstractions.csproj
      fail-on-coverage: true
      coverage-line-min: 90
      coverage-branch-min: 80
